name: CI Core

on:
  push:
    branches: ["develop", "master"]
  pull_request:
    branches: ["develop", "master"]

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build development Docker image
        run: docker build -f Dockerfile.dev -t tuulikartta-dev:ci .

  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

  cypress-stubbed:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Start static web server
        run: python3 -m http.server 8080 --directory . > /tmp/http-server.log 2>&1 &

      - name: Wait for app to be ready
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:8080/ > /dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done
          echo "App did not become ready in time"
          exit 1

      - name: Run Cypress stubbed tests
        run: CYPRESS_baseUrl=http://localhost:8080 npx cypress run --browser chrome --spec cypress/e2e/main.stubbed.cy.js

      - name: Dump web server log on failure
        if: failure()
        run: tail -n 200 /tmp/http-server.log || true
