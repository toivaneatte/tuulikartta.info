name: CI Smoke

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build production Docker image
        run: docker build -f Dockerfile -t tuulikartta-prod:ci .

  cypress-smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build and start app with Docker Compose
        run: docker compose -f docker-compose.dev.yml up --build -d tuulikartta

      - name: Wait for app to be ready
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:80/ > /dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done
          echo "App did not become ready in time"
          exit 1

      - name: Run Cypress smoke tests
        run: npx cypress run --browser chrome --spec cypress/e2e/main.smoke.cy.js

      - name: Dump container logs on failure
        if: failure()
        run: docker compose -f docker-compose.dev.yml logs --tail=200 tuulikartta

      - name: Stop containers
        if: always()
        run: docker compose -f docker-compose.dev.yml down
