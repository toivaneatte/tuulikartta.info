services:
  tuulikartta:
    container_name: tuulikartta
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "80:80"
    volumes:
      - ./index.html:/var/www/html/index.html
      - ./list.php:/var/www/html/list.php
      - ./manifest.json:/var/www/html/manifest.json
      - ./offline.html:/var/www/html/offline.html
      - ./serviceWorker.js:/var/www/html/serviceWorker.js
      - ./sitemap.fi.xml:/var/www/html/sitemap.fi.xml
      - ./sitemap.xml:/var/www/html/sitemap.xml
      - ./css:/var/www/html/css
      - ./js:/var/www/html/js
      - ./php:/var/www/html/php
      - ./symbols:/var/www/html/symbols
      - ./tietoa-sivustosta:/var/www/html/tietoa-sivustosta
      - data:/var/www/html/data
    environment:
      - APACHE_RUN_USER=www-data
      - APACHE_RUN_GROUP=www-data
    networks:
      - tuulikartta-network

  backend:
    container_name: backend
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      - REDIS_URL=redis://redis:6379
      - DB_PATH=/var/data/favourites.db
    volumes:
      - favourites-db:/var/data
    networks:
      - tuulikartta-network

  redis:
    container_name: redis
    image: redis:7.4-alpine
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --save 20 1 --loglevel warning
    volumes:
      - cache:/data
    networks:
      - tuulikartta-network
  
networks:
  tuulikartta-network:
    driver: bridge

  osm-import:
    container_name: osm-import
    build:
      context: ./karttapalvelin/import
    volumes:
      - osm-data:/data/database/
    environment:
      - DOWNLOAD_PBF=https://download.geofabrik.de/europe/finland-latest.osm.pbf

  osm-tile-server:
    container_name: osm-tile-server
    build:
      context: ./karttapalvelin/render
    ports:
      - "8080:80"
    volumes:
      - osm-data:/data/database/
      - osm-tiles:/data/tiles/
    command: ["run"]
    depends_on:
      osm-import:
        condition: service_completed_successfully
    shm_size: 256m

volumes:
  data:
  osm-data:
  osm-tiles:
  cache:
    driver: local
  favourites-db:
    driver: local
