services:
  tuulikartta:
    container_name: tuulikartta
    build:
      context: .
      dockerfile: Dockerfile
    #ports:
    #  - "80:80"
    environment:
      - PROD_MODE=true
    networks:
      - tuulikartta-network

  backend:
    container_name: backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    volumes:
      - ./backend:/app
      - /app/node_modules
      - favourites-db:/var/data
    environment:
      - REDIS_URL=redis://redis:6379
      - DB_PATH=/var/data/favourites.db
    networks:
      - tuulikartta-network

  redis:
    container_name: redis
    image: redis:7.4-alpine
    restart: always
    ports:
      - '6379:6379'
    command: redis-server --maxmemory 256mb --save 20 1 --loglevel warning
    volumes:
      - cache:/data
    networks:
      - tuulikartta-network
  nginx:
    container_name: nginx
    image: nginx:latest
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - tuulikartta
    networks:
      - tuulikartta-network

  osm-import:
    container_name: osm-import
    build:
      context: ./karttapalvelin/import
    volumes:
      - osm-data:/data/database/
    environment:
      - DOWNLOAD_PBF=https://download.geofabrik.de/europe/finland-latest.osm.pbf

  osm-tile-server:
    container_name: osm-tile-server
    build:
      context: ./karttapalvelin/render
    ports:
      - '8080:80'
    command: 'run'
    volumes:
      - osm-data:/data/database/
      - osm-tiles:/data/tiles/
    depends_on:
      osm-import:
        condition: service_completed_successfully
    shm_size: 256m

networks:
  tuulikartta-network:
    driver: bridge

volumes:
  osm-data:
  osm-tiles:
  cache:
    driver: local
  favourites-db:
    driver: local
